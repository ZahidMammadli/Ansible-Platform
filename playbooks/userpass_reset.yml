---
- hosts: all
  become: yes
  gather_facts: no

  vars:
    automationpass: 'g2whaLco'
    rootpass: 'Hwz_Z8xT'
    sesdaadmpass: '84W4VBzZZT'

  tasks:
    - name: Ensure sesdaadm user exists
      user:
        name: sesdaadm
        state: present
        shell: /bin/bash

    - name: Change automation password
      user:
        name: automation
        update_password: always
        password: "{{ automationpass | password_hash('sha512') }}"

    - name: Change root password
      user:
        name: root
        update_password: always
        password: "{{ rootpass | password_hash('sha512') }}"

    - name: Change sesdaadm password
      user:
        name: sesdaadm
        update_password: always
        password: "{{ sesdaadmpass | password_hash('sha512') }}"

