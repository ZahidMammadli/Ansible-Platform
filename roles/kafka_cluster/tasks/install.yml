- name: Ensure kafka user exists
  user:
    name: kafka
    shell: /bin/bash
    create_home: yes

- name: Download Kafka tarball
  become: yes
  get_url:
    url: "https://downloads.apache.org/kafka/{{ kafka_version }}/kafka_{{ kafka_scala_version }}-{{ kafka_version }}.tgz"
    dest: /tmp/kafka.tgz
    mode: "0644"

- name: Create kafka base dir
  file:
    path: "{{ kafka_base_dir }}"
    state: directory
    owner: kafka
    group: kafka

- name: Extract Kafka
  become: yes
  unarchive:
    src: /tmp/kafka.tgz
    dest: "{{ kafka_base_dir }}"
    extra_opts: [--strip-components=1]
    remote_src: yes

