# roles/superset/tasks/docker.yml

- name: Create Superset project directory
  file:
    path: "{{ superset_project_dir }}"
    state: directory
    mode: "0755"

- name: Copy Dockerfile
  copy:
    src: Dockerfile
    dest: "{{ superset_project_dir }}/Dockerfile"
    mode: "0644"

- name: Copy docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: "{{ superset_project_dir }}/docker-compose.yml"
    mode: "0644"

- name: Bring up Superset stack with docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ superset_project_dir }}"
    build: always
    state: present
  register: superset_compose
