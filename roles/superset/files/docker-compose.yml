version: "3.7"

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    volumes:
      - superset_db:/var/lib/postgresql/data

  superset:
    build: .
    ports:
      - 8088:8088
    environment:
      SUPERSET_ENV: production
      SUPERSET_SECRET_KEY: "2zgkucKJEAZm6IJvXyk+I9378v5CYYIrMV5FHb6xjx9FbL/iQPIv1eQV"
      DATABASE_DB: superset
      DATABASE_USER: superset
      DATABASE_PASSWORD: superset
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      CACHE_CONFIG: '{}'
      SUPERSET_CELERY_WORKERS: "0"
    depends_on:
      - postgres

volumes:
  superset_db:

