---
- name: Ensure base directories exist for custom data & archive
  file:
    path: "{{ item }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0755"
  loop:
    - "{{ postgresql_data_dir | dirname }}"      # /pgsql
    - "{{ postgresql_archive_dir | dirname }}"   # /pgarch
    - "{{ postgresql_archive_dir }}"             # /pgarch/archive

- name: Check if data already moved
  stat:
    path: "{{ postgresql_data_dir }}/PG_VERSION"
  register: pgdata_stat

- name: Stop PostgreSQL service before moving data
  systemd:
    name: "{{ postgresql_service_name }}"
    state: stopped
  when: not pgdata_stat.stat.exists

- name: Create custom data directory (first move)
  file:
    path: "{{ postgresql_data_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"
  when: not pgdata_stat.stat.exists

- name: Move existing data directory to custom location (rsync)
  command: >
    rsync -a {{ postgresql_default_data_dir }}/ {{ postgresql_data_dir }}/
  when: not pgdata_stat.stat.exists

- name: Ensure custom data dir permissions
  file:
    path: "{{ postgresql_data_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

# postgresql.conf path
- name: Set data_directory in postgresql.conf
  lineinfile:
    path: "{{ postgresql_conf_dir }}/postgresql.conf"
    regexp: '^#?\s*data_directory\s*='
    line: "data_directory = '{{ postgresql_data_dir }}'"
  notify: restart postgres

- name: Set listen_addresses in postgresql.conf
  lineinfile:
    path: "{{ postgresql_conf_dir }}/postgresql.conf"
    regexp: '^#?\s*listen_addresses\s*='
    line: "listen_addresses = '{{ postgresql_listen_addresses }}'"
  notify: restart postgres

- name: Enable archive_mode in postgresql.conf
  lineinfile:
    path: "{{ postgresql_conf_dir }}/postgresql.conf"
    regexp: '^#?\s*archive_mode\s*='
    line: "archive_mode = {{ postgresql_archive_mode }}"
  notify: restart postgres

- name: Set archive_command in postgresql.conf
  lineinfile:
    path: "{{ postgresql_conf_dir }}/postgresql.conf"
    regexp: '^#?\s*archive_command\s*='
    line: "archive_command = '{{ postgresql_archive_command }}'"
  notify: restart postgres

# pg_hba.conf: allow remote connections (adjust CIDR as needed)
- name: Allow remote access over TCP (pg_hba.conf)
  lineinfile:
    path: "{{ postgresql_conf_dir }}/pg_hba.conf"
    insertafter: EOF
    line: "host    all             all             0.0.0.0/0               scram-sha-256"
  notify: restart postgres

- name: Ensure psycopg2 is installed for PostgreSQL modules
  package:
    name: python3-psycopg2
    state: present

- name: Ensure ACL package is installed (required for become_user=postgres)
  package:
    name: acl
    state: present

- name: Enable and start PostgreSQL service
  systemd:
    name: "{{ postgresql_service_name }}"
    enabled: yes
    state: started

- name: Change postgres database user password
  become: yes
  become_user: postgres
  community.postgresql.postgresql_user:
    name: postgres
    password: "{{ postgres_db_pass }}"
    role_attr_flags: "SUPERUSER"
    db: postgres

- name: Change postgres system user password
  user:
    name: postgres
    update_password: always
    password: "{{ postgres_sys_pass | password_hash('sha512') }}"    
  notify: restart postgres