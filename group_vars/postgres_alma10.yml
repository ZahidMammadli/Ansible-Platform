# PostgreSQL base settings
postgresql_version: 14
postgresql_service_name: "postgresql-{{ postgresql_version }}"

# PGDG repo key path
#postgresql_pgdg_key_path: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc

# Data + archive directories
postgresql_data_dir: /pgsql/data
postgresql_archive_dir: /pgarch/archive
postgresql_default_data_dir: "/var/lib/pgsql/{{ postgresql_version }}/data"
postgresql_conf_dir: "{{ postgresql_data_dir }}"

# Listen
postgresql_listen_addresses: "*"

# Archive config
postgresql_archive_mode: "on"
postgresql_archive_command: "test ! -f {{ postgresql_archive_dir }}/%f && cp %p {{ postgresql_archive_dir }}/%f"

# Application DB/user
postgres_app_user: "user"
postgres_app_db: "user"
postgres_app_schema: "schema"

postgres_app_password: "password"

postgres_sys_pass: 'password'
postgres_db_pass: 'password'
